services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-drivex_db}
      POSTGRES_USER: ${DB_USER:-drivex_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-drivex_user} -d ${DB_NAME:-drivex_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DB_NAME: ${DB_NAME:-drivex_db}
      DB_USER: ${DB_USER:-drivex_user}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
